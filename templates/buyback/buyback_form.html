{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel" style="max-width:920px;margin:0 auto">
  <div class="panel-header">
    <h3><i class="fas fa-mobile-alt"></i> شراء جهاز من عميل خارجي</h3>
    <p style="color:#64748b;font-size:0.9rem;margin-top:0.35rem">إدخال للمخزون + صرف نقدي/بنكي + إيصال وإقرار رسمي</p>
  </div>
  <div class="panel-body">
    <form method="post" enctype="multipart/form-data">{% csrf_token %}
      <h4 class="form-section-title"><i class="fas fa-user"></i> بيانات البائع</h4>
      <div class="form-grid">
        <div class="form-group"><label>اسم البائع *</label><input name="seller_name" class="form-control" required></div>
        <div class="form-group"><label>رقم التليفون *</label><input name="seller_phone" class="form-control" required></div>
        <div class="form-group"><label>رقم البطاقة / الهوية *</label><input name="national_id" class="form-control" required maxlength="20"></div>
        <div class="form-group"><label>صورة البطاقة</label><input type="file" name="id_card_photo" class="form-control" accept="image/*"></div>
      </div>

      <h4 class="form-section-title" style="margin-top:1.25rem"><i class="fas fa-box"></i> الجهاز والمخزون</h4>
      <div class="form-grid">
        <div class="form-group"><label>التاريخ</label><input type="date" name="date" class="form-control" value="{{ today|date:'Y-m-d' }}"></div>
        <div class="form-group"><label>المخزن *</label>
          <select name="warehouse" class="form-control" required>{% for w in warehouses %}<option value="{{ w.pk }}">{{ w.name }}</option>{% endfor %}</select>
        </div>
        <div class="form-group form-span-2">
          <label>الصنف في المخزون</label>
          <div class="product-mode-toggle">
            <label class="mode-option"><input type="radio" name="product_mode" value="existing" checked> صنف موجود</label>
            <label class="mode-option"><input type="radio" name="product_mode" value="new"> إنشاء صنف جديد (اختياري)</label>
          </div>
        </div>
      </div>

      <div id="panel-existing" class="form-grid">
        <div class="form-group form-span-2"><label>اختر الصنف</label>
          <select name="product" id="product-select" class="form-control">
            <option value="">اختر الصنف...</option>
            {% regroup products by category as cat_groups %}
            {% for grp in cat_groups %}
            <optgroup label="{{ grp.grouper.name }}">
              {% for p in grp.list %}
              <option value="{{ p.pk }}" data-model="{{ p.model_name }}" data-storage="{{ p.storage }}" data-color="{{ p.color }}" data-serial="{{ p.is_serialized|yesno:'1,0' }}">{{ p.sku }} — {{ p.name }}{% if p.brand %} ({{ p.brand.name }}){% endif %}</option>
              {% endfor %}
            </optgroup>
            {% endfor %}
          </select>
        </div>
      </div>

      <div id="panel-new" class="form-grid" style="display:none">
        <div class="form-group"><label>الفئة *</label>
          <select name="new_category" id="new-category" class="form-control">
            <option value="">اختر الفئة...</option>
            {% for c in categories %}<option value="{{ c.pk }}">{{ c.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group"><label>الماركة *</label>
          <select name="new_brand" id="new-brand" class="form-control">
            <option value="">اختر الماركة...</option>
            {% for b in brands %}<option value="{{ b.pk }}">{{ b.name }}</option>{% endfor %}
          </select>
        </div>
        <div class="form-group form-span-2"><label>اسم الصنف (اختياري — يُولَّد تلقائياً)</label>
          <input name="new_product_name" id="new-product-name" class="form-control" placeholder="مثال: iPhone 13 Pro 256GB أسود">
        </div>
        <p class="form-hint form-span-2">سيُنشأ صنف جديد بحالة «مستعمل» وتتبع بالسيريال، ويُربط تلقائياً بأسعار الشراء والبيع.</p>
      </div>

      <div class="form-grid" style="margin-top:0.5rem">
        <div class="form-group"><label>الموديل</label><input name="model_name" id="field-model" class="form-control" placeholder="iPhone 13 Pro"></div>
        <div class="form-group"><label>السعة / الذاكرة</label><input name="storage" id="field-storage" class="form-control" placeholder="256GB"></div>
        <div class="form-group"><label>اللون</label><input name="color" id="field-color" class="form-control"></div>
        <div class="form-group"><label>السيريال / IMEI *</label><input name="serial_number" id="field-serial" class="form-control" placeholder="354..."></div>
        <div class="form-group form-span-2"><label>مواصفات إضافية</label>
          <textarea name="device_specs" class="form-control" rows="2" placeholder="حالة الجهاز، ملحقات، خدوش..."></textarea>
        </div>
      </div>

      <h4 class="form-section-title" style="margin-top:1.25rem"><i class="fas fa-money-bill-wave"></i> الدفع</h4>
      <div class="form-grid">
        <div class="form-group"><label>مبلغ الشراء (ج.م) *</label><input type="number" name="purchase_amount" class="form-control" step="0.01" min="0.01" required></div>
        <div class="form-group"><label>سعر البيع المقترح</label><input type="number" name="sale_price" class="form-control" step="0.01" min="0"></div>
        <div class="form-group"><label>طريقة الدفع *</label>
          <select name="payment_type" id="pay-type" class="form-control">
            <option value="cash">نقدي — من الخزنة</option>
            <option value="bank">بنك — من الحساب</option>
          </select>
        </div>
        <div class="form-group" id="bank-wrap" style="display:none"><label>البنك *</label>
          <select name="bank" class="form-control"><option value="">—</option>{% for b in banks %}<option value="{{ b.pk }}">{{ b.name }} ({{ b.balance }} ج.م)</option>{% endfor %}</select>
        </div>
        <div class="form-group form-span-2"><label>ملاحظات</label><input name="notes" class="form-control"></div>
      </div>

      <div style="margin-top:1.5rem;display:flex;flex-wrap:wrap;gap:0.5rem">
        <button type="submit" name="after_save" value="detail" class="btn btn-primary btn-lg"><i class="fas fa-check"></i> حفظ وترحيل للمخزون</button>
        <button type="submit" name="after_save" value="receipt" class="btn btn-success"><i class="fas fa-receipt"></i> حفظ + طباعة إيصال</button>
        <button type="submit" name="after_save" value="declaration" class="btn btn-outline"><i class="fas fa-file-alt"></i> حفظ + إقرار A4</button>
        <a href="{% url 'buyback_list' %}" class="btn btn-outline">إلغاء</a>
      </div>
    </form>
  </div>
</div>
<style>
.form-section-title { font-size:1rem;font-weight:800;color:#334155;margin-bottom:0.75rem; }
.form-section-title i { color:#2563eb;margin-left:0.35rem; }
.product-mode-toggle { display:flex; flex-wrap:wrap; gap:1rem; margin-top:0.35rem; }
.mode-option { display:flex; align-items:center; gap:0.4rem; font-weight:600; cursor:pointer; }
.form-hint { font-size:0.85rem; color:#64748b; margin:0; }
</style>
<script>
(function() {
  const prod = document.getElementById('product-select');
  const payType = document.getElementById('pay-type');
  const panelExisting = document.getElementById('panel-existing');
  const panelNew = document.getElementById('panel-new');
  const fieldSerial = document.getElementById('field-serial');
  const modeRadios = document.querySelectorAll('input[name=product_mode]');

  function isNewMode() {
    return document.querySelector('input[name=product_mode]:checked')?.value === 'new';
  }

  function refreshMode() {
    const isNew = isNewMode();
    panelExisting.style.display = isNew ? 'none' : '';
    panelNew.style.display = isNew ? '' : 'none';
    prod.required = !isNew;
    document.getElementById('new-category').required = isNew;
    document.getElementById('new-brand').required = isNew;
    fieldSerial.required = true;
  }

  modeRadios.forEach(r => r.addEventListener('change', refreshMode));

  prod?.addEventListener('change', () => {
    const o = prod.selectedOptions[0];
    if (!o || !o.value) return;
    if (o.dataset.model) document.getElementById('field-model').value = o.dataset.model;
    if (o.dataset.storage) document.getElementById('field-storage').value = o.dataset.storage;
    if (o.dataset.color) document.getElementById('field-color').value = o.dataset.color;
    if (!isNewMode()) fieldSerial.required = o.dataset.serial === '1';
  });

  payType?.addEventListener('change', () => {
    document.getElementById('bank-wrap').style.display = payType.value === 'bank' ? '' : 'none';
  });

  refreshMode();
})();
</script>
{% endblock %}
