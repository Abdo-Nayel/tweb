{% extends 'layout_app.html' %}
{% block page_content %}
<div class="panel"><div class="panel-header"><h3>عميل</h3></div><div class="panel-body">
<form method="post">{% csrf_token %}
<div class="form-grid">
  <div class="form-group"><label>الكود</label><input name="code" class="form-control" value="{% if obj %}{{ obj.code }}{% else %}{{ suggested_code }}{% endif %}"></div>
  <div class="form-group"><label>اسم العميل *</label><input name="name" class="form-control" required value="{{ obj.name|default:'' }}"></div>
  <div class="form-group"><label>الهاتف</label><input name="phone" class="form-control" value="{{ obj.phone|default:'' }}"></div>
  <div class="form-group"><label>حد الائتمان</label><input name="credit_limit" type="number" step="0.01" class="form-control" value="{{ obj.credit_limit|default:'0' }}"></div>
  <div class="form-group full"><label>العنوان</label><input name="address" class="form-control" value="{{ obj.address|default:'' }}"></div>
  <div class="form-group"><label><input type="checkbox" name="is_active" {% if not obj or obj.is_active %}checked{% endif %}> نشط</label></div>
</div>
<button class="btn btn-primary">حفظ</button> <a href="{% url 'customer_list' %}" class="btn btn-outline">رجوع</a>
</form></div></div>
{% endblock %}
